<!DOCTYPE html>
<head>
	<meta charset="UTF-8">
	<title>МАТМАНЁВР - Главная</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
	<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</head>
<body>
	<topbar>
		<lcont>
			<a href="/">
				<h1>МАТМАНЁВР</h1>
			</a>
		</lcont>
		<mcont>
			<input id="tb-search" name="tb-search" type="text" placeholder="Название товара, ...">
		</mcont>
		<rcont>
			<button id="tb-cart" class="img-btn">
				<img src="{{ url_for('static', filename='img/cart.svg') }}" alt="Корзина">
			</button>
			<button id="tb-profile" class="img-btn">
				<img src="{{ url_for('static', filename='img/profile.svg') }}" alt="Профиль">
			</button>
		</rcont>
	</topbar>

	<content>
		<div id="main-grid" class="products-grid">
			<div class="product-card">
				<img class="product-image" src="{{ url_for('static', filename='img/question.svg') }}" alt="Изображение товара">
				<h3 class="product-title">Название товара</h3>
				<p class="product-description">
					Короткое описание товара.
				</p>
				<div class="product-price">Цена товара ₽</div>
				<button class="btn-add-to-cart cart-actions-btn">В корзину</button>
				<div class="cart-controls hidden">
					<div class="cart-quantity-row">
						<span>Количество:</span>
						<input type="number" min="1" value="1" class="quantity-input">
						<button class="btn-increase-qty cart-actions-btn">+</button>
						<button class="btn-decrease-qty cart-actions-btn">−</button>
					</div>
					<div class="cart-stock-row">
						<span>Из 12 на складе</span>
						<button class="btn-remove-from-cart cart-actions-btn">Убрать из корзины</button>
					</div>
				</div>
			</div>
		</div>
	</content>

	<div id="drawer-overlay"></div>
	<div id="cart-drawer" class="drawer">
		<div class="drawer-header">
			<h2>Корзина</h2>
			<button class="drawer-close">x</button>
		</div>
		<div class="drawer-body">
			<p>Ваша корзина пока пуста</p>
		</div>
	</div>

	<div id="profile-drawer" class="drawer">
		<div class="drawer-header">
			<h2>Профиль</h2>
			<button class="drawer-close">x</button>
		</div>
		<div class="drawer-body">
			<p>Имя пользователя</p>
			<p>email@example.com</p>
			<br>
			<a href="/profile">Перейти в профиль</a>
		</div>
	</div>
</body>
