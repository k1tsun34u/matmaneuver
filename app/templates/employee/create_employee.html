{% extends "base-employee.html" %}

{% block title %}Сотрудник{% endblock %}
{% block head %}
	<script type="module" src="{{ url_for('static', filename='js/pages/employee/create_employee.js') }}" defer></script>
{% endblock %}

{% block content %}
	<h1>Создать сотрудника</h1>
	<div class="hcont">
		<label for="hired_at">Дата найма:</label>
		<input type="date" name="hired_at" id="hired_at">
	</div>
	<h2>Выберите пользователя:</h2>
	<hr/>
	<div class="hcont">
		<p>Поиск:</p>
		<input id="search" type="text" placeholder="Введите ФИО, телефон или почту..." style="min-width: 80%;"/>
		<button id="search_btn">Найти</button>
	</div>
	<hr/>
	<div id="tgt">
		<p>Пусто...</p>
	</div>
	
	<hr/>
	<div class="hcont">
		<button id="prev_pg">&lt;</button>
		<p id="page_number" style="min-width: 80%;">Страница: 1</p>
		<button id="next_pg">&gt;</button>
	</div>
	<button id="create" class="green-bg">Создать сотрудника</button>
{% endblock %}
