{% extends "base-employee.html" %}

{% block title %}Поставщики{% endblock %}
{% block head %}
	<script type="module" src="{{ url_for('static', filename='js/pages/employee/suppliers.js') }}" defer></script>
{% endblock %}

{% block content %}
	<h1>Поставщики</h1>
	<div class="hcont">
		<p>Поиск:</p>
		<input id="search" type="text" placeholder="Введите ФИО, телефон или почту..." style="min-width: 70%;"/>
		<button id="search_btn">Найти</button>
		<button id="create" class="green-bg">+</button>
	</div>
	<hr/>
	<div class="hcont">
		<p style="font-weight: bold;">Полное имя</p>
		<p style="font-weight: bold;">Телефон</p>
		<p style="font-weight: bold;">Состояние</p>
	</div>
	<hr/>

	<div id="tgt">
		<p>Пусто...</p>
	</div>

	<hr/>
	<div class="hcont">
		<button id="prev_pg">&lt;</button>
		<p id="page_number" style="min-width: 80%;">Страница: 1</p>
		<button id="next_pg">&gt;</button>
	</div>
{% endblock %}
