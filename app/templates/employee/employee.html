{% extends "base-employee.html" %}

{% block title %}Сотрудник{% endblock %}
{% block head %}
	<script type="module" src="{{ url_for('static', filename='js/pages/employee/employee.js') }}" defer></script>
{% endblock %}

{% block content %}
	<h1>Сотрудник</h1>
	<div class="vcont">
		<p id="full_name" style="font-weight: bold;">Полное имя: </p>
		<p id="phone">Номер телефона: </p>
		<p id="email">Почта: </p>
		<p id="created_at">Создан: </p>
		<p id="hired_at">Когда нанят: </p>
		<p id="hired_by">Кем нанят: </p>
		<p id="fired_at">Когда уволен: </p>
		<p id="fired_by">Кем уволен: </p>
		<div id="action" class="hcont"></div>
	</div>

	<br/>
	<hr/>
	<h2 style="font-weight: bold;">Роли:</h2>
	<hr/>
	<div class="hcont">
		<p>Поиск:</p>
		<input id="search" type="text" placeholder="Введите код..." style="min-width: 80%;"/>
		<button id="search_btn">Найти</button>
	</div>
	<hr/>

	<div id="tgt">
		<p>Пусто...</p>
	</div>

	<hr/>
	<div class="hcont">
		<button id="prev_pg">&lt;</button>
		<p id="page_number" style="min-width: 80%;">Страница: 1</p>
		<button id="next_pg">&gt;</button>
	</div>
	<button id="set_roles" class="green-bg">Изменить роли</button>
{% endblock %}
