{% extends "base-employee.html" %}

{% block title %}Поставка{% endblock %}
{% block head %}
	<script type="module" src="{{ url_for('static', filename='js/pages/employee/supply.js') }}" defer></script>
{% endblock %}

{% block content %}
	<h1>Поставка</h1>
	<p id="supplier_full_name" style="font-weight: bold;">Поставщик: </p>
	<p id="warehouse_address" style="font-weight: bold;">Адрес склада: </p>
	<p id="planned_delivery_date">Планируемая дата доставки: </p>
	<p id="created_at">Создана: </p>
	<div class="hcont">
		<label for="sel_status" style="text-align: left;">Состояние:</label>
		<select id="sel_status" name="sel_status" style="min-width: 80%;">
			<button>
				<selectedcontent></selectedcontent>
			</button>

			<option value="CREATED">Создана</option>
			<option value="CONFIRMED">Подтверждена</option>
			<option value="IN_TRANSIT">В пути</option>
			<option value="DELIVERED">Завершена</option>
			<option value="CANCELLED">Отменена</option>
		</select>
	</div>
	<button id="set_status">Изменить состояние</button>

	<br/>
	<h2 style="font-weight: bold;">Товары:</h2>
	<hr/>

	<div id="tgt">
		<p>Пусто...</p>
	</div>

	<hr/>
	<div class="hcont">
		<button id="prev_pg">&lt;</button>
		<p id="page_number" style="min-width: 80%;">Страница: 1</p>
		<button id="next_pg">&gt;</button>
	</div>
{% endblock %}
