{% extends "base-employee.html" %}

{% block title %}Роль{% endblock %}
{% block head %}
	<script type="module" src="{{ url_for('static', filename='js/pages/employee/create_role.js') }}" defer></script>
{% endblock %}

{% block content %}
	<h1>Создать роль</h1>
	<div class="hcont">
		<p>Код:</p>
		<input id="code" type="text" placeholder="ROLE_CODE" style="min-width: 85%; text-align: start;" required/>
	</div>
	<br/>
	<hr/>
	<h2>Разрешения:</h2>
	<hr/>
	<div class="hcont">
		<p>Поиск:</p>
		<input id="search" type="text" placeholder="Введите код или описание..." style="min-width: 80%;"/>
		<button id="search_btn">Найти</button>
	</div>
	<p>Фильтры:</p>
	<div class="hcont">
		<label for="exclude_deactivated" class="cb-lbl">Исключить деактивированные
			<input id="exclude_deactivated" name="exclude_deactivated" type="checkbox" checked/>
			<span class="cb-mark"></span>
		</label>
	</div>
	<hr/>
	<div id="tgt">
		<p>Пусто...</p>
	</div>
	
	<hr/>
	<div class="hcont">
		<button id="prev_pg">&lt;</button>
		<p id="page_number" style="min-width: 80%;">Страница: 1</p>
		<button id="next_pg">&gt;</button>
	</div>
	<button id="create" class="green-bg">Создать роль</button>
{% endblock %}
