{% extends "base-employee.html" %}

{% block title %}Разрешения{% endblock %}
{% block head %}
	<script type="module" src="{{ url_for('static', filename='js/pages/employee/permissions.js') }}" defer></script>
{% endblock %}

{% block content %}
	<h1>Разрешения</h1>
	<div class="hcont">
		<p>Поиск:</p>
		<input id="search" type="text" placeholder="Введите название или описание..." style="min-width: 80%;"/>
		<button id="search_btn">Найти</button>
		<button id="create" class="green-bg">+</button>
	</div>
	<p>Фильтры:</p>
	<div class="hcont">
		<label for="exclude_deactivated" class="cb-lbl">Исключить деактивированные
			<input id="exclude_deactivated" name="exclude_deactivated" type="checkbox" checked/>
			<span class="cb-mark"></span>
		</label>
	</div>
	<br/>
	<hr/>
	<div class="hcont">
		<h2>Код</h2>
		<h2>Статус</h2>
	</div>
	<hr/>

	<div id="tgt">
		<p>Пусто...</p>
	</div>

	<hr/>
	<div class="hcont">
		<button id="prev_pg">&lt;</button>
		<p id="page_number" style="min-width: 80%;">Страница: 1</p>
		<button id="next_pg">&gt;</button>
	</div>
{% endblock %}
