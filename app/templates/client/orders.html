{% extends "base-client.html" %}

{% block title %}Ваши заказы{% endblock %}
{% block head %}
	<script type="module" src="{{ url_for('static', filename='js/pages/client/orders.js') }}" defer></script>
{% endblock %}

{% block content %}
	<h1>Ваши заказы</h1>
	<div class="hcont">
		<p>Поиск:</p>
		<input id="search" type="text" placeholder="Введите номер заказа или адрес доставки..." style="min-width: 80%;"/>
		<button id="search_btn">Найти</button>
	</div>
	<div class="vcont">
		<p>Фильтры:</p>
		<div class="hcont">
			<label for="sel_status">Статус: </label>
			<select id="sel_status" name="sel_status">
				<button>
					<selectedcontent></selectedcontent>
				</button>

				<option value="__ALL__">Все</option>
				<option value="CREATED">Создан</option>
				<option value="CONFIRMED">Подтверждён</option>
				<option value="IN_TRANSIT">В пути</option>
				<option value="DELIVERED">Завершён</option>
				<option value="CANCELLED">Отменён</option>
			</select>
			<p>Создан после:</p>
			<input id="created_from" name="created_from" type="date">
			<p>Создан до:</p>
			<input id="created_to" name="created_to" type="date">
		</div>
	<hr/>

	<div id="tgt">
		<p>Пусто...</p>
	</div>

	<hr/>
	<div class="hcont">
		<button id="prev_pg">&lt;</button>
		<p id="page_number" style="min-width: 80%;">Страница: 1</p>
		<button id="next_pg">&gt;</button>
	</div>
{% endblock %}
