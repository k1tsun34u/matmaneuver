{% extends "base-client.html" %}

{% block title %}Главная{% endblock %}
{% block head %}
	<script type="module" src="{{ url_for('static', filename='js/pages/client/index.js') }}" defer></script>
{% endblock %}

{% block content %}
	<h1>Товары</h1>
	<div class="hcont">
		<p>Поиск:</p>
		<input id="search" type="text" placeholder="Введите название или описание..." style="min-width: 80%;"/>
		<button id="search_btn">Найти</button>
	</div>
	<p>Фильтры:</p>
	<div class="hcont">
		<p>Минимальная цена:</p>
		<input id="min_price" name="min_price" type="number" style="min-width: 75%;"/>
	</div>
	<div class="hcont">
		<p>Максимальная цена:</p>
		<input id="max_price" name="max_price" type="number" style="min-width: 75%;"/>
	</div>
	<hr/>

	<div id="tgt">
		<p>Пусто...</p>
	</div>

	<hr/>
	<div class="hcont">
		<button id="prev_pg">&lt;</button>
		<p id="page_number" style="min-width: 80%;">Страница: 1</p>
		<button id="next_pg">&gt;</button>
	</div>
{% endblock %}
