{% extends "base-client.html" %}

{% block title %}Регистрация{% endblock %}
{% block head %}
	<script type="module" src="{{ url_for('static', filename='js/pages/register.js') }}" defer></script>
{% endblock %}

{% block content %}
	<div class="ccont">
		<div class="vcont">
			<h1>Регистрация</h1>
			<div class="hcont">
				<label for="full_name">Ваше ФИО:</label>
				<input id="full_name" name="full_name" type="text" placeholder="Власов Алексей Дмитриевич" required>
			</div>
			<div class="hcont">
				<label for="phone">Телефон:</label>
				<input id="phone" name="phone" type="text" placeholder="+71234567890" required>
			</div>
			<div class="hcont">
				<label for="email">Почта:</label>
				<input id="email" name="email" type="text" placeholder="your-email@mail.ru">
			</div>
			<div class="hcont">
				<label for="password">Пароль:</label>
				<input id="password" name="password" type="password" placeholder="..." required>
			</div>
			<button id="register" class="green-bg">Зарегистрироваться</button>
			<hr/>
			<a class="btn" href="/login">У меня уже есть аккаунт!</a>
		</div>
	</div>
{% endblock %}
